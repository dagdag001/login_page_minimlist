<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Sign up</h1>

    <section class="panel">
      <form id="form-signup">
        <p id="signup-error" class="form-error hidden" role="alert"></p>
        <label>Name <input name="name" required autocomplete="name" /></label>
        <label>Email <input name="email" type="email" required autocomplete="email" /></label>
        <label>Password <input name="password" type="password" required autocomplete="new-password" /></label>
        <label>Location <input name="location" required autocomplete="address-level1" /></label>
        <label>Birth date <input name="birthdate" type="date" required /></label>
        <button type="submit">Create account</button>
      </form>
      <p class="sub"><a href="index.html">Already have an account? Log in</a></p>
    </section>
  </main>
  <script src="signup.js"></script>
</body>
</html>
